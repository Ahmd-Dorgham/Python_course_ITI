<!DOCTYPE html>
<html>
<head>
    <title>Add Book</title>
</head>
<body bgcolor="#f0f0f0">
    <center>
        <h2>Add a New Book</h2>
        <form method="POST">
            {% csrf_token %}
            <p>Title: <input type="text" name="title"></p>
            <p>Description: <br><textarea name="desc" rows="4" cols="30"></textarea></p>
            <p>Rate: <input type="number" step="0.1" name="rate"></p>
            <p>Views: <input type="number" name="views"></p>
            <input type="submit" value="Save Book">
        </form>
        <br>
        <a href="{% url 'book_list' %}">Go Back</a>
    </center>
</body>
</html>
