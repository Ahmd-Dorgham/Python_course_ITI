<!DOCTYPE html>
<html>
<head>
    <title>Edit Book</title>
</head>
<body bgcolor="#f0f0f0">
    <center>
        <h2>Edit Book: {{ book.title }}</h2>
        <form method="POST">
            {% csrf_token %}
            <p>Title: <input type="text" name="title" value="{{ book.title }}"></p>
            <p>Description: <br><textarea name="desc" rows="4" cols="30">{{ book.desc }}</textarea></p>
            <p>Rate: <input type="number" step="0.1" name="rate" value="{{ book.rate }}"></p>
            <p>Views: <input type="number" name="views" value="{{ book.views }}"></p>
            <input type="submit" value="Update Book">
        </form>
        <br>
        <a href="{% url 'book_list' %}">Go Back</a>
    </center>
</body>
</html>
